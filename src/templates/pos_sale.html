<!DOCTYPE html>
<html class="dark" lang="uz">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sotuv (POS) - Fixed Alignment</title>

    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4ed8",
                        "emerald-accent": "#10b981",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: { "display": ["Manrope", "sans-serif"] }
                },
            },
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body { 
                font-family: 'Manrope', sans-serif; 
                @apply bg-[#0f172a] text-slate-100;
            }
        }
        
        /* 1. ASOSIY TUZATISH: Kutubxona ramkasini bizning ramka bilan birlashtirish */
        #reader { border: none !important; }
        
        /* Kutubxona chizadigan ichki kvadrat (haqiqiy skaner maydoni) */
        #reader__scan_region {
            @apply flex items-center justify-center !important;
        }

        /* Kutubxona ramkasining o'zini bizning style'ga moslash */
        #reader__scan_region > div {
            border: 2px solid rgba(255,255,255,0.1) !important;
            border-radius: 1.5rem !important;
            position: relative !important;
        }

        /* Skaner chizig'ini kutubxona ramkasi ichiga majburan tiqish */
        #reader__scan_region > div::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(to bottom, transparent, #10b981, transparent);
            animation: scan-move 2s linear infinite;
        }

        @keyframes scan-move {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        #reader__dashboard { display: none !important; }
        #reader video { object-fit: cover !important; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }

    /* Kutubxonaning xunuk ramkasini shaffof qilish */
    #reader__scan_region {
        @apply flex items-center justify-center !important;
    }

    /* Haqiqiy skaner maydoni (Kutubxonaniki) */
    #reader__scan_region > div {
        border: none !important; /* Kutubxona chizig'ini yo'qotadi */
        background: transparent !important;
        position: relative !important;
    }

    /* Sizning vizual ramkangizni (Overlay) kutubxona ramkasi ichiga majburan tiqamiz */
    .custom-overlay-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 280px; /* JS dagi qrbox width bilan bir xil */
        height: 160px; /* JS dagi qrbox height bilan bir xil */
        z-index: 30;
        pointer-events: none;
    }

    /* Kutubxonaning boshqa keraksiz elementlari */
    #reader__dashboard, #reader img { display: none !important; }
    #reader video { object-fit: cover !important; }


    @layer base {
        body { @apply bg-[#0f172a] text-slate-100; }
    }

    /* 1. KUTUBXONA RAMKASINI "INVISIBLE" QILAMIZ */
    #reader { border: none !important; }
    #reader__scan_region { 
        @apply flex items-center justify-center !important;
    }
    /* Kutubxona chizig'ini yashiramiz, lekin u o'sha yerda ishlayveradi */
    #reader__scan_region > div {
        border: none !important; 
        background: transparent !important;
    }
    #reader__dashboard { display: none !important; }
    #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }

    /* 2. BIZNING PROFESSIONAL RAMKA */
    .scanner-container {
        @apply absolute inset-0 flex items-center justify-center z-20 pointer-events-none;
    }
    
    /* Bu ramka o'lchami JS dagi qrbox bilan bir xil bo'lishi shart */
    .scanner-target {
        width: 280px;
        height: 160px;
        @apply relative border border-white/5 rounded-[2rem] backdrop-blur-[1px];
        background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%);
    }

    /* Lazer nuri */
    .laser-line {
        @apply absolute left-0 w-full h-[2px] z-30;
        background: linear-gradient(to right, transparent, #10b981, transparent);
        box-shadow: 0 0 15px 1px rgba(16, 185, 129, 0.5);
        animation: laser-move 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes laser-move {
        0%, 100% { top: 5%; opacity: 0.3; }
        50% { top: 95%; opacity: 1; }
    }

    /* Burchaklarni yanada nafisroq qilamiz */
    .corner { @apply absolute size-8 border-emerald-accent; }
    .t-l { @apply -top-1 -left-1 border-t-4 border-l-4 rounded-tl-2xl; }
    .t-r { @apply -top-1 -right-1 border-t-4 border-r-4 rounded-tr-2xl; }
    .b-l { @apply -bottom-1 -left-1 border-b-4 border-l-4 rounded-bl-2xl; }
    .b-r { @apply -bottom-1 -right-1 border-b-4 border-r-4 rounded-br-2xl; }
</style>
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

    <header
        class="sticky top-0 z-40 bg-[#0f172a]/90 backdrop-blur-xl px-6 pt-10 pb-4 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-4">
            <button class="size-10 flex items-center justify-center rounded-full bg-slate-800/50"
                onclick="window.history.back()">
                <span class="material-symbols-outlined text-xl">arrow_back_ios_new</span>
            </button>
            <h1 class="text-lg font-bold tracking-tight">Sotuv (POS)</h1>
        </div>
        <button id="torch-btn"
            class="size-10 flex items-center justify-center rounded-xl bg-slate-800/50 text-slate-400">
            <span class="material-symbols-outlined text-xl">flashlight_on</span>
        </button>
    </header>

    <main class="flex-1 flex flex-col">
        <section class="relative h-82 bg-black overflow-hidden border-b border-white/5">
            <div id="reader" class="absolute inset-0 z-10 opacity-80"></div>

            <div class="scanner-container">
                <div class="scanner-target">
                    <div class="laser-line"></div>

                    <div class="corner t-l"></div>
                    <div class="corner t-r"></div>
                    <div class="corner b-l"></div>
                    <div class="corner b-r"></div>

                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="size-1 bg-white/20 rounded-full"></div>
                    </div>
                </div>

                <div
                    class="absolute bottom-6 flex items-center gap-2 bg-[#10b981]/20 backdrop-blur-md text-emerald-400 px-5 py-2 rounded-2xl border border-emerald-500/30">
                    <span class="relative flex h-2 w-2">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-[11px] font-bold uppercase tracking-[0.2em]">Skanerlash faol</span>
                </div>
            </div>
        </section>

        <section class="flex-1 flex flex-col px-6 pt-6 pb-6">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-2">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Savatcha</h2>
                    <span id="cart-count"
                        class="bg-primary/20 text-blue-400 px-3 py-1 rounded-lg text-[10px] font-black">0</span>
                </div>
                <button onclick="clearCart()"
                    class="text-xs font-bold text-red-400 flex items-center gap-1 transition-colors">
                    <span class="material-symbols-outlined text-lg">delete_sweep</span> Tozalash
                </button>
            </div>

            <div id="cart-items" class="flex-1 space-y-3 overflow-y-auto max-h-[35vh] hide-scrollbar pb-4">
            </div>

            <div class="mt-auto py-4 space-y-4">
                <div
                    class="bg-slate-800/40 border border-white/5 p-5 rounded-[2.5rem] flex justify-between items-center">
                    <span class="text-sm font-semibold text-slate-400 ml-2">Jami:</span>
                    <div class="text-right">
                        <span id="total-price" class="text-3xl font-black text-emerald-accent">0</span>
                        <span class="text-xs font-bold text-emerald-500/60 ml-1">UZS</span>
                    </div>
                </div>

                <button onclick="processCheckout()"
                    class="w-full bg-primary text-white font-extrabold py-5 rounded-[2rem] flex items-center justify-center gap-3 shadow-xl shadow-primary/30 active:scale-[0.97] transition-all">
                    <span class="material-symbols-outlined text-2xl">account_balance_wallet</span>
                    <span class="text-lg">To'lovni yakunlash</span>
                </button>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>


        let cart = [];
        let isScanning = true;

        const html5QrCode = new Html5Qrcode("reader");

        // CSS dagi w-[280px] h-[160px] bilan bir xil qilindi
        const qrConfig = {
            fps: 30,
            qrbox: { width: 280, height: 160 },
            aspectRatio: 1.0
        };

        html5QrCode.start({ facingMode: "environment" }, qrConfig, (barcode) => {
            if (isScanning) {
                handleNewBarcode(barcode);
                isScanning = false;
                setTimeout(() => { isScanning = true; }, 1500);
            }
        }).catch(err => console.error(err));

        async function handleNewBarcode(barcode) {
            new Audio('https://www.soundjay.com/buttons/beep-07.wav').play().catch(() => { });
            try {
                const response = await fetch(`?barcode=${barcode}`);
                const data = await response.json();
                if (data.status === "success") { addToCart(data); }
            } catch (err) { console.error(err); }
        }

        function addToCart(product) {
            const existing = cart.find(item => item.id === product.id);
            if (existing) { existing.qty += 1; }
            else { cart.push({ ...product, qty: 1 }); }
            renderCart();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id == id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(i => i.id != id);
            }
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center py-10 opacity-20"><span class="material-symbols-outlined text-5xl mb-2">barcode_scanner</span><p class="text-sm italic font-medium">Savat bo'sh</p></div>`;
                document.getElementById('total-price').innerText = "0";
                document.getElementById('cart-count').innerText = "0";
                return;
            }

            let html = '';
            let total = 0;
            cart.forEach(item => {
                total += (item.price * item.qty);
                html += `
                <div class="bg-slate-800/50 p-4 rounded-3xl border border-white/5 flex items-center gap-4">
                    <div class="flex-1">
                        <h3 class="text-sm font-bold text-slate-100 truncate">${item.name}</h3>
                        <p class="text-xs text-emerald-400 font-black mt-0.5">${item.price.toLocaleString()} UZS</p>
                    </div>
                    <div class="flex items-center gap-3 bg-slate-900/80 rounded-2xl p-1.5 border border-white/5">
                        <button onclick="updateQty(${item.id}, -1)" class="size-8 rounded-xl bg-slate-800 text-white flex items-center justify-center font-black">-</button>
                        <span class="text-xs font-black min-w-[24px] text-center">${item.qty}</span>
                        <button onclick="updateQty(${item.id}, 1)" class="size-8 rounded-xl bg-primary text-white flex items-center justify-center font-black">+</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
            document.getElementById('total-price').innerText = total.toLocaleString();
            document.getElementById('cart-count').innerText = cart.length;
        }

        function clearCart() {
            if (confirm("Savatni tozalash?")) { cart = []; renderCart(); }
        }

        async function processCheckout() {
            if (cart.length === 0) return;
            const csrf = document.querySelector('[name=csrfmiddlewaretoken]').value;
            try {
                const response = await fetch('/order/api/make-sale/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
                    body: JSON.stringify({ items: cart, total_amount: cart.reduce((a, b) => a + (b.price * b.qty), 0) })
                });
                if (response.ok) {
                    alert("To'lov yakunlandi!");
                    cart = []; renderCart();
                }
            } catch (err) { alert("Xatolik"); }
        }
    </script>
</body>

</html>
