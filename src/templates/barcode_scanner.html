<!DOCTYPE html>
<html class="dark" lang="uz">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shtrix-kod skanerlash</title>

    <script src="https://cdn.tailwindcss.com/3.4.1"></script>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: "Manrope", sans-serif;
            background: #101822;
            color: white;
        }

        #reader {
            width: 100%;
            border: none !important;
        }

        #reader video {
            object-fit: cover;
            border-radius: 1rem;
        }

        /* Skanerlash animatsiyasi */
        .scan-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 180px;
            border: 2px solid rgba(16, 185, 129, 0.5);
            border-radius: 1rem;
            pointer-events: none;
            z-index: 10;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #10b981;
            box-shadow: 0 0 15px 2px #10b981;
            animation: scan 2.5s ease-in-out infinite;
        }

        @keyframes scan {

            0%,
            100% {
                top: 0%;
            }

            50% {
                top: 100%;
            }
        }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden">
    <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

    <header class="p-6 text-center">
        <h1 class="text-sm font-bold uppercase tracking-widest text-emerald-500">Barcode Scanner</h1>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4">
        <div class="relative w-full max-w-[400px] overflow-hidden rounded-2xl bg-black shadow-2xl">
            <div id="reader"></div>

            <div class="scan-overlay">
                <div class="scan-line"></div>
            </div>
        </div>

        <div id="status" class="mt-6 p-3 bg-gray-800 rounded-lg text-xs text-gray-300">
            Kamera ruxsatini kuting...
        </div>
    </main>

    <footer class="p-8 text-center text-sm text-gray-400">
        Shtrix-kodni ramka ichiga olib keling
    </footer>

    <script>
        const statusDiv = document.getElementById('status');
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        let isScanning = true;

        function onScanSuccess(decodedText, decodedResult) {
            // Skanerlash jarayoni band bo'lsa, to'xtatamiz
            if (!isScanning) return;

            isScanning = false; // Ketma-ket o'qishni to'xtatish

            // Vizual holatni yangilash
            statusDiv.innerText = "Shtrix-kod topildi: " + decodedText;
            statusDiv.classList.add('text-emerald-400');

            // Foydalanuvchini mahsulot yaratish sahifasiga, o'qilgan kod bilan yuboramiz
            // URL manzili siz ko'rsatgan linkka moslandi
            const targetUrl = "/product/products/create/";

            // Sahifani qayta yuklash va kodni URL parametri sifatida uzatish
            window.location.href = targetUrl + "?barcode=" + encodeURIComponent(decodedText);
        } function onScanFailure(error) {
            // Har bir kadrda o'qiy olmasa xato bermasligi uchun buni bo'sh qoldiramiz
        }

        let html5QrcodeScanner = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 280, height: 180 } };

        // Kamerani ishga tushirish
        html5QrcodeScanner.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
            onScanFailure
        ).catch(err => {
            statusDiv.innerText = "Kamera topilmadi yoki ruxsat berilmadi.";
            console.error(err);
        });
    </script>
</body>

</html>
